<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampaignText HQ - Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.login-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:2rem;max-width:400px;width:100%;text-align:center}
.login-card h1{font-size:1.5rem;color:#f59e0b;margin-bottom:0.3rem}
.login-card .subtitle{color:#94a3b8;font-size:0.85rem;margin-bottom:1.5rem}
.form-group{margin-bottom:1rem;text-align:left}
.form-group label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px}
.form-group input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px;color:#e2e8f0;font-size:15px;outline:none}
.form-group input:focus{border-color:#f59e0b}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:hover{opacity:0.85}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:#f59e0b;color:#000}
.btn-secondary{background:#334155;color:#e2e8f0}
.error-msg{color:#ef4444;font-size:13px;margin-top:8px;min-height:20px}
.success-msg{color:#22c55e;font-size:13px;margin-top:8px}
.logo{font-size:2.5rem;margin-bottom:0.5rem}
.setup-note{background:#422006;border:1px solid #f59e0b;border-radius:8px;padding:12px;margin-bottom:1rem;text-align:left}
.setup-note p{font-size:13px;color:#fcd34d}
.toggle-link{color:#60a5fa;font-size:13px;cursor:pointer;margin-top:12px;display:inline-block}
.toggle-link:hover{color:#93c5fd}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">&#x1F3DB;</div>
  <h1>CampaignText HQ</h1>
  <div class="subtitle">Political Campaign Management</div>

  <!-- SETUP FORM (first time only) -->
  <div id="setupForm" style="display:none">
    <div class="setup-note">
      <p>Welcome! Create your admin account to get started. This is a one-time setup.</p>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="setupUsername" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Display Name</label>
      <input type="text" id="setupDisplayName" placeholder="Your name">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="setupPassword" placeholder="Min 6 characters" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="setupPasswordConfirm" placeholder="Confirm password" autocomplete="new-password">
    </div>
    <button class="btn btn-primary" id="btnSetup" onclick="doSetup()">Create Account</button>
    <div class="error-msg" id="setupError"></div>
  </div>

  <!-- LOGIN FORM -->
  <div id="loginForm" style="display:none">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="loginUsername" placeholder="Username" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="btnLogin" onclick="doLogin()">Sign In</button>
    <div id="googleLoginBtn" style="display:none;margin-top:12px">
      <div style="text-align:center;color:#64748b;font-size:13px;margin:8px 0">or</div>
      <a href="/api/auth/google" class="btn btn-secondary" style="text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </a>
    </div>
    <div class="error-msg" id="loginError"></div>
  </div>

  <!-- LOADING -->
  <div id="loadingMsg" style="color:#64748b;padding:2rem">Loading...</div>
</div>

<script>
// Check auth status on load
(async function() {
  try {
    var res = await fetch('/api/auth/status');
    var data = await res.json();

    document.getElementById('loadingMsg').style.display = 'none';

    if (data.loggedIn) {
      // Already logged in, redirect to dashboard
      window.location.href = '/';
      return;
    }

    if (!data.hasUsers) {
      // First time setup
      document.getElementById('setupForm').style.display = '';
    } else {
      // Show login
      document.getElementById('loginForm').style.display = '';
      if (data.googleEnabled) {
        document.getElementById('googleLoginBtn').style.display = '';
      }
    }
  } catch(e) {
    document.getElementById('loadingMsg').textContent = 'Failed to connect to server.';
  }
})();

// Enter key support
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (document.getElementById('setupForm').style.display !== 'none') doSetup();
    else if (document.getElementById('loginForm').style.display !== 'none') doLogin();
  }
});

async function doSetup() {
  var errEl = document.getElementById('setupError');
  errEl.textContent = '';

  var username = document.getElementById('setupUsername').value.trim();
  var displayName = document.getElementById('setupDisplayName').value.trim();
  var password = document.getElementById('setupPassword').value;
  var confirm = document.getElementById('setupPasswordConfirm').value;

  if (!username) { errEl.textContent = 'Username is required.'; return; }
  if (!password || password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }
  if (password !== confirm) { errEl.textContent = 'Passwords do not match.'; return; }

  document.getElementById('btnSetup').disabled = true;
  try {
    var res = await fetch('/api/auth/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password, displayName: displayName })
    });
    var data = await res.json();
    if (!res.ok || data.error) { errEl.textContent = data.error || 'Setup failed'; return; }
    window.location.href = '/';
  } catch(e) {
    errEl.textContent = 'Setup failed: ' + e.message;
  } finally {
    document.getElementById('btnSetup').disabled = false;
  }
}

async function doLogin() {
  var errEl = document.getElementById('loginError');
  errEl.textContent = '';

  var username = document.getElementById('loginUsername').value.trim();
  var password = document.getElementById('loginPassword').value;

  if (!username || !password) { errEl.textContent = 'Username and password required.'; return; }

  document.getElementById('btnLogin').disabled = true;
  try {
    var res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    });
    var data = await res.json();
    if (!res.ok || data.error) { errEl.textContent = data.error || 'Login failed'; return; }
    window.location.href = '/';
  } catch(e) {
    errEl.textContent = 'Login failed: ' + e.message;
  } finally {
    document.getElementById('btnLogin').disabled = false;
  }
}
</script>
</body>
</html>
