<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Walker Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;overflow-x:hidden}

.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.login-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:2rem;max-width:400px;width:100%;text-align:center}
.login-card h2{font-size:1.4rem;margin-bottom:0.5rem;color:#818cf8}
.login-card p{color:#94a3b8;font-size:0.85rem;margin-bottom:1.5rem}
.form-group{margin-bottom:1rem;text-align:left}
.form-group label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px}
.form-group input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:14px;color:#e2e8f0;font-size:18px;text-align:center;outline:none;letter-spacing:4px;text-transform:uppercase}
.form-group input:focus{border-color:#818cf8}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 24px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;width:100%;text-decoration:none;color:#fff}
.btn:hover{opacity:0.85}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:#818cf8}
.btn-walk{background:#f59e0b;color:#000}
.btn-sm{padding:8px 16px;font-size:13px;width:auto}
.error-msg{color:#ef4444;font-size:13px;margin-top:8px}

.portal-header{background:#1e293b;border-bottom:1px solid #334155;padding:16px;display:flex;justify-content:space-between;align-items:center}
.portal-header h2{font-size:18px;color:#818cf8}
.portal-header .sub{font-size:12px;color:#94a3b8;margin-top:2px}
.logout-btn{background:none;border:1px solid #475569;color:#94a3b8;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.logout-btn:hover{border-color:#ef4444;color:#ef4444}

.container{max-width:500px;margin:0 auto;padding:16px}

.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px;text-align:center}
.stat-card .value{font-size:26px;font-weight:700;color:#e2e8f0}
.stat-card .label{font-size:11px;color:#64748b;text-transform:uppercase;margin-top:2px}
.stat-card.green .value{color:#4ade80}
.stat-card.amber .value{color:#fbbf24}

.section-title{font-size:14px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;margin-top:20px}

.leaderboard{background:#1e293b;border:1px solid #334155;border-radius:12px;overflow:hidden;margin-bottom:20px}
.leaderboard table{width:100%;border-collapse:collapse}
.leaderboard th{text-align:left;padding:10px 14px;font-size:11px;color:#64748b;text-transform:uppercase;border-bottom:1px solid #334155}
.leaderboard td{padding:10px 14px;font-size:14px;border-bottom:1px solid #1e293b}
.leaderboard tr.me{background:#1e1b4b}
.leaderboard tr.me td{color:#818cf8;font-weight:600}
.leaderboard .rank{color:#64748b;font-size:12px;width:30px}

.walk-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:12px}
.walk-card h4{font-size:16px;color:#e2e8f0;margin-bottom:4px}
.walk-card .walk-desc{font-size:13px;color:#94a3b8;margin-bottom:8px}
.walk-card .walk-stats{display:flex;gap:16px;margin-bottom:8px}
.walk-card .walk-stat{font-size:12px;color:#64748b}
.walk-card .walk-stat span{color:#e2e8f0;font-weight:600}
.progress-bar{height:6px;background:#334155;border-radius:3px;overflow:hidden;margin-bottom:12px}
.progress-fill{height:100%;background:#22c55e;border-radius:3px;transition:width 0.3s}

.empty-state{text-align:center;color:#64748b;padding:40px 20px;font-size:14px}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h2>Walker Portal</h2>
    <p>Enter your walker code to view your assignments</p>
    <div class="form-group">
      <label>Walker Code</label>
      <input type="text" id="codeInput" maxlength="6" placeholder="ABC123" autofocus>
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="login()">Sign In</button>
    <div id="loginError" class="error-msg" style="display:none"></div>
  </div>
</div>

<!-- Portal Screen -->
<div id="portalScreen" style="display:none">
  <div class="portal-header">
    <div>
      <h2 id="walkerNameHeader">Walker</h2>
      <div class="sub" id="candidateInfo"></div>
    </div>
    <button class="logout-btn" onclick="logout()">Log Out</button>
  </div>

  <div class="container">
    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="value" id="statDoors">0</div><div class="label">Doors Knocked</div></div>
      <div class="stat-card green"><div class="value" id="statContacts">0</div><div class="label">Contacts Made</div></div>
      <div class="stat-card amber"><div class="value" id="statRate">0%</div><div class="label">Contact Rate</div></div>
      <div class="stat-card"><div class="value" id="statWalks">0</div><div class="label">Walks</div></div>
    </div>

    <!-- Leaderboard -->
    <div class="section-title">Leaderboard</div>
    <div class="leaderboard" id="leaderboardWrap">
      <table>
        <thead><tr><th>#</th><th>Name</th><th>Doors</th><th>Contacts</th></tr></thead>
        <tbody id="leaderboardBody"><tr><td colspan="4" style="color:#64748b;text-align:center">No data yet</td></tr></tbody>
      </table>
    </div>

    <!-- Active Walks -->
    <div class="section-title">My Walks</div>
    <div id="walksList"></div>
  </div>
</div>

<script>
var walkerId = null;
var walkerCode = '';

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

document.getElementById('codeInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});

// Check URL for code param
(function() {
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  if (code) {
    document.getElementById('codeInput').value = code;
    login();
  }
})();

async function login() {
  var code = document.getElementById('codeInput').value.trim();
  if (!code) return;
  var errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  document.getElementById('loginBtn').disabled = true;
  try {
    var resp = await fetch('/api/walkers/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code })
    });
    var data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Login failed');
    walkerId = data.walker.id;
    walkerCode = data.walker.code;
    document.getElementById('walkerNameHeader').textContent = data.walker.name;
    document.getElementById('candidateInfo').textContent = data.walker.candidate_name + (data.walker.candidate_office ? ' \u2014 ' + data.walker.candidate_office : '');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('portalScreen').style.display = 'block';
    loadDashboard();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
  document.getElementById('loginBtn').disabled = false;
}

function logout() {
  walkerId = null;
  walkerCode = '';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('portalScreen').style.display = 'none';
  document.getElementById('codeInput').value = '';
}

async function loadDashboard() {
  if (!walkerId) return;
  try {
    var resp = await fetch('/api/walkers/' + walkerId + '/dashboard');
    var data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Failed to load dashboard');

    // Stats
    var s = data.stats;
    document.getElementById('statDoors').textContent = s.total_doors || 0;
    document.getElementById('statContacts').textContent = s.total_contacts || 0;
    document.getElementById('statRate').textContent = (s.contact_rate || 0) + '%';
    document.getElementById('statWalks').textContent = s.walks_participated || 0;

    // Leaderboard — build with DOM methods (safe from XSS)
    var lb = data.leaderboard || [];
    var tbody = document.getElementById('leaderboardBody');
    tbody.textContent = '';
    if (lb.length === 0) {
      var emptyRow = document.createElement('tr');
      var emptyCell = document.createElement('td');
      emptyCell.colSpan = 4;
      emptyCell.style.cssText = 'color:#64748b;text-align:center';
      emptyCell.textContent = 'No data yet';
      emptyRow.appendChild(emptyCell);
      tbody.appendChild(emptyRow);
    } else {
      for (var i = 0; i < lb.length; i++) {
        var w = lb[i];
        var isMe = w.id === walkerId;
        var tr = document.createElement('tr');
        if (isMe) tr.className = 'me';
        var tdRank = document.createElement('td');
        tdRank.className = 'rank';
        tdRank.textContent = i + 1;
        tr.appendChild(tdRank);
        var tdName = document.createElement('td');
        tdName.textContent = w.name + (isMe ? ' (you)' : '');
        tr.appendChild(tdName);
        var tdDoors = document.createElement('td');
        tdDoors.textContent = w.total_doors || 0;
        tr.appendChild(tdDoors);
        var tdContacts = document.createElement('td');
        tdContacts.textContent = w.total_contacts || 0;
        tr.appendChild(tdContacts);
        tbody.appendChild(tr);
      }
    }

    // Walks — build with DOM methods
    var walks = data.walks || [];
    var container = document.getElementById('walksList');
    container.textContent = '';
    if (walks.length === 0) {
      var emptyDiv = document.createElement('div');
      emptyDiv.className = 'empty-state';
      emptyDiv.textContent = 'No walks assigned yet. Ask your campaign admin to assign you.';
      container.appendChild(emptyDiv);
    } else {
      for (var j = 0; j < walks.length; j++) {
        var wk = walks[j];
        var pct = wk.total_addresses > 0 ? Math.round((wk.completed_addresses / wk.total_addresses) * 100) : 0;

        var card = document.createElement('div');
        card.className = 'walk-card';

        var h4 = document.createElement('h4');
        h4.textContent = wk.name;
        card.appendChild(h4);

        if (wk.description) {
          var desc = document.createElement('div');
          desc.className = 'walk-desc';
          desc.textContent = wk.description;
          card.appendChild(desc);
        }

        var statsDiv = document.createElement('div');
        statsDiv.className = 'walk-stats';
        var statItems = [
          { label: 'Total', val: wk.total_addresses },
          { label: 'Done', val: wk.completed_addresses },
          { label: 'My knocks', val: wk.my_doors || 0 }
        ];
        for (var k = 0; k < statItems.length; k++) {
          var sd = document.createElement('div');
          sd.className = 'walk-stat';
          sd.textContent = statItems[k].label + ': ';
          var sp = document.createElement('span');
          sp.textContent = statItems[k].val;
          sd.appendChild(sp);
          statsDiv.appendChild(sd);
        }
        card.appendChild(statsDiv);

        var bar = document.createElement('div');
        bar.className = 'progress-bar';
        var fill = document.createElement('div');
        fill.className = 'progress-fill';
        fill.style.width = pct + '%';
        bar.appendChild(fill);
        card.appendChild(bar);

        var link = document.createElement('a');
        link.href = '/walk?walkId=' + wk.id + '&walkerId=' + walkerId;
        link.className = 'btn btn-walk btn-sm';
        link.style.display = 'inline-block';
        link.textContent = 'Start Walking';
        card.appendChild(link);

        container.appendChild(card);
      }
    }
  } catch (e) {
    var errDiv = document.createElement('div');
    errDiv.className = 'empty-state';
    errDiv.textContent = 'Error: ' + e.message;
    document.getElementById('walksList').textContent = '';
    document.getElementById('walksList').appendChild(errDiv);
  }
}
</script>
</body>
</html>
