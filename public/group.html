<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Group Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;overflow-x:hidden}

.container{max-width:500px;margin:0 auto;padding:1.5rem}

/* Login screen */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.login-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:2rem;max-width:400px;width:100%;text-align:center}
.login-card h2{font-size:1.4rem;margin-bottom:0.5rem;color:#818cf8}
.login-card p{color:#94a3b8;font-size:0.85rem;margin-bottom:1.5rem}
.form-group{margin-bottom:1rem;text-align:left}
.form-group label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px}
.form-group input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:14px;color:#e2e8f0;font-size:18px;text-align:center;outline:none;letter-spacing:4px;text-transform:uppercase}
.form-group input:focus{border-color:#818cf8}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 24px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;width:100%}
.btn:hover{opacity:0.85}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:#818cf8;color:#fff}
.btn-walk{background:#f59e0b;color:#000}
.btn-sm{padding:8px 16px;font-size:13px;width:auto}
.btn-secondary{background:#334155;color:#e2e8f0}
.error-msg{color:#ef4444;font-size:13px;margin-top:8px}

/* Portal header */
.portal-header{background:#1e293b;border-bottom:1px solid #334155;padding:16px;display:flex;justify-content:space-between;align-items:center}
.portal-header h2{font-size:18px;color:#818cf8}
.portal-header .logout-btn{background:none;border:1px solid #475569;color:#94a3b8;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.portal-header .logout-btn:hover{border-color:#ef4444;color:#ef4444}

/* Walk cards */
.walks-section{padding:16px}
.walks-section h3{font-size:16px;color:#94a3b8;margin-bottom:12px}
.walk-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:12px}
.walk-card h4{font-size:16px;color:#e2e8f0;margin-bottom:4px}
.walk-card .walk-desc{font-size:13px;color:#94a3b8;margin-bottom:8px}
.walk-card .walk-stats{display:flex;gap:16px;margin-bottom:12px}
.walk-card .walk-stat{font-size:12px;color:#64748b}
.walk-card .walk-stat span{color:#e2e8f0;font-weight:600}
.progress-bar{height:6px;background:#334155;border-radius:3px;overflow:hidden;margin-bottom:12px}
.progress-fill{height:100%;background:#22c55e;border-radius:3px;transition:width 0.3s}

.empty-state{text-align:center;color:#64748b;padding:40px 20px;font-size:14px}

.badge{display:inline-block;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600}
.badge-green{background:#052e16;color:#4ade80}
.badge-yellow{background:#422006;color:#fcd34d}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h2>Group Portal</h2>
    <p>Enter your group code to access block walks</p>
    <div class="form-group">
      <label>Group Code</label>
      <input type="text" id="groupCodeInput" maxlength="6" placeholder="ABC123" autofocus>
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="login()">Join</button>
    <div id="loginError" class="error-msg" style="display:none"></div>
  </div>
</div>

<!-- Portal Screen -->
<div id="portalScreen" style="display:none">
  <div class="portal-header">
    <h2 id="groupName">Group</h2>
    <button class="logout-btn" onclick="logout()">Log Out</button>
  </div>

  <div class="walks-section">
    <h3>Active Block Walks</h3>
    <div id="walksList"></div>
  </div>
</div>

<script>
var groupId = null;
var groupName = '';

// Enter key triggers login
document.getElementById('groupCodeInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});

async function login() {
  var code = document.getElementById('groupCodeInput').value.trim();
  if (!code) return;
  var errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  document.getElementById('loginBtn').disabled = true;
  try {
    var resp = await fetch('/api/groups/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code })
    });
    var data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Login failed');
    groupId = data.group.id;
    groupName = data.group.name;
    document.getElementById('groupName').textContent = groupName;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('portalScreen').style.display = 'block';
    loadWalks();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
  document.getElementById('loginBtn').disabled = false;
}

function logout() {
  groupId = null;
  groupName = '';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('portalScreen').style.display = 'none';
  document.getElementById('groupCodeInput').value = '';
}

async function loadWalks() {
  if (!groupId) return;
  var container = document.getElementById('walksList');
  try {
    var resp = await fetch('/api/groups/' + groupId + '/walks');
    var data = await resp.json();
    var walks = data.walks || [];
    if (walks.length === 0) {
      container.innerHTML = '<div class="empty-state">No active block walks right now. Check back later!</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < walks.length; i++) {
      var w = walks[i];
      var pct = w.total_addresses > 0 ? Math.round((w.completed_addresses / w.total_addresses) * 100) : 0;
      html += '<div class="walk-card">';
      html += '<h4>' + esc(w.name) + '</h4>';
      if (w.description) html += '<div class="walk-desc">' + esc(w.description) + '</div>';
      html += '<div class="walk-stats">';
      html += '<div class="walk-stat">Doors: <span>' + w.total_addresses + '</span></div>';
      html += '<div class="walk-stat">Done: <span>' + w.completed_addresses + '</span></div>';
      html += '<div class="walk-stat">Progress: <span>' + pct + '%</span></div>';
      html += '</div>';
      html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
      html += '<a href="/walk?code=' + encodeURIComponent(w.join_code) + '" class="btn btn-walk btn-sm" style="text-decoration:none">Join Walk</a>';
      html += '</div>';
    }
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = '<div class="empty-state">Error loading walks: ' + esc(e.message) + '</div>';
  }
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
</script>
</body>
</html>
