  <!-- ===== Big Checkmark V ===== -->
  <path d="M 8 40 L 50 130 L 75 70" stroke="#0A2463" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== LUIS (red, above VILLARREAL) ===== -->
