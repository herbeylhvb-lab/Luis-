<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Check-In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 420px;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .logo { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .voter-name {
      font-size: 1.6rem;
      font-weight: 700;
      color: #00d4aa;
      margin-bottom: 0.25rem;
    }
    .welcome-text {
      font-size: 0.95rem;
      color: #888;
      margin-bottom: 1.5rem;
    }
    .event-card {
      background: #16213e;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.2rem;
      margin-bottom: 0.75rem;
      text-align: left;
    }
    .event-card-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.3rem;
    }
    .event-meta {
      font-size: 0.85rem;
      color: #888;
    }
    .event-meta span { margin-right: 0.75rem; }
    .btn-checkin {
      width: 100%;
      padding: 0.85rem;
      background: #00d4aa;
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.75rem;
    }
    .btn-checkin:hover { background: #00b894; }
    .btn-checkin:disabled { opacity: 0.5; cursor: not-allowed; }
    .no-events {
      color: #888;
      font-size: 1rem;
      margin-top: 1.5rem;
      padding: 2rem;
      background: #16213e;
      border-radius: 12px;
      border: 1px solid #333;
    }
    .success-container {
      display: none;
      text-align: center;
    }
    .success-container .checkmark {
      font-size: 5rem;
      animation: pop 0.4s ease;
    }
    @keyframes pop {
      0% { transform: scale(0); }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .success-container h2 {
      color: #00d4aa;
      margin: 1rem 0 0.5rem;
      font-size: 1.6rem;
    }
    .success-container p { color: #aaa; font-size: 1.05rem; }
    .already-badge {
      display: inline-block;
      background: #16213e;
      border: 1px solid #00d4aa;
      color: #00d4aa;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      margin-top: 0.5rem;
    }
    .loading-msg {
      color: #888;
      font-size: 1rem;
      margin-top: 2rem;
    }
    .error-msg {
      color: #ff6b6b;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    .geo-badge {
      display: inline-block;
      background: #1a1a3e;
      border: 1px solid #4a9eff;
      color: #4a9eff;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.75rem;
      margin-top: 0.5rem;
    }
    .location-msg {
      color: #888;
      font-size: 0.8rem;
      margin-top: 0.4rem;
    }
    .past-checkins {
      margin-top: 2rem;
      text-align: left;
    }
    .past-checkins h3 {
      font-size: 0.85rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .past-item {
      font-size: 0.85rem;
      color: #888;
      padding: 0.3rem 0;
      border-bottom: 1px solid #222;
    }
    .past-item:last-child { border-bottom: none; }

    /* Stacked "Add to Calendar" popups */
    .cal-popup-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
    }
    .cal-popup {
      background: #16213e;
      border: 2px solid #4a9eff;
      border-radius: 16px;
      padding: 2rem 1.5rem;
      max-width: 360px;
      width: 90%;
      text-align: center;
      animation: pop 0.35s ease;
    }
    .cal-popup .cal-icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    .cal-popup .cal-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.3rem;
    }
    .cal-popup .cal-meta {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 0.3rem;
      line-height: 1.5;
    }
    .cal-popup .cal-counter {
      font-size: 0.75rem;
      color: #4a9eff;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .cal-popup .cal-add-btn {
      width: 100%;
      padding: 1rem;
      background: #4a9eff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 0.5rem;
      text-decoration: none;
      display: block;
    }
    .cal-popup .cal-add-btn:hover { background: #3b8de8; }
    .cal-popup .cal-google-btn {
      width: 100%;
      padding: 0.75rem;
      background: transparent;
      color: #4a9eff;
      border: 1px solid #4a9eff;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 0.75rem;
      text-decoration: none;
      display: block;
    }
    .cal-popup .cal-google-btn:hover { background: rgba(74,158,255,0.1); }
    .cal-popup .cal-skip-btn {
      padding: 0.5rem 1.5rem;
      background: transparent;
      border: none;
      color: #666;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .cal-popup .cal-skip-btn:hover { color: #aaa; }
    .cal-popup .cal-added {
      display: none;
      padding: 1rem 0;
    }
    .cal-popup .cal-added .cal-check {
      font-size: 3rem;
      animation: pop 0.4s ease;
    }
    .cal-popup .cal-added p {
      color: #00d4aa;
      font-weight: 600;
      margin-top: 0.3rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">&#127881;</div>

    <div id="loading" class="loading-msg">Loading...</div>

    <div id="main-content" style="display:none;">
      <div class="voter-name" id="voterName"></div>
      <div class="welcome-text">Welcome! Tap an event below to check in.</div>
      <div id="events-list"></div>
      <div id="no-events" class="no-events" style="display:none;">
        No active events right now.<br>Check back when the next event starts!
      </div>
      <div id="past-checkins" class="past-checkins" style="display:none;">
        <h3>Your Past Check-Ins</h3>
        <div id="past-list"></div>
      </div>
    </div>

    <div class="success-container" id="success">
      <div class="checkmark">&#9989;</div>
      <h2>You're Checked In!</h2>
      <p id="successMsg"></p>
    </div>

    <div id="not-found" style="display:none;">
      <div style="font-size:3rem;">&#128533;</div>
      <h2 style="color:#ff6b6b;margin-top:1rem;">Invalid QR Code</h2>
      <p style="color:#888;margin-top:0.5rem;">This check-in link is not valid. Please contact the campaign for assistance.</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <script>
    var token = window.location.pathname.split('/').pop();

    fetch('/api/voters/qr/' + token)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        document.getElementById('loading').style.display = 'none';
        if (data.error) {
          document.getElementById('not-found').style.display = 'block';
          return;
        }
        var v = data.voter;
        if (!v) {
          document.getElementById('not-found').style.display = 'block';
          return;
        }
        document.getElementById('voterName').textContent = v.first_name + ' ' + v.last_name;
        document.getElementById('main-content').style.display = 'block';

        var eventsEl = document.getElementById('events-list');
        if (data.events.length === 0) {
          document.getElementById('no-events').style.display = 'block';
        } else {
          var checkedEventIds = {};
          (data.checkins || []).forEach(function(c) { checkedEventIds[c.event_id] = true; });

          // Collect upcoming events for calendar popups
          var calendarEvents = [];

          data.events.forEach(function(e) {
            var card = document.createElement('div');
            card.className = 'event-card';

            var title = document.createElement('div');
            title.className = 'event-card-title';
            title.textContent = e.title;
            card.appendChild(title);

            var meta = document.createElement('div');
            meta.className = 'event-meta';
            var dateSpan = document.createElement('span');
            dateSpan.textContent = '\uD83D\uDCC5 ' + e.event_date;
            meta.appendChild(dateSpan);
            if (e.event_time) {
              var timeSpan = document.createElement('span');
              timeSpan.textContent = '\uD83D\uDD50 ' + e.event_time;
              meta.appendChild(timeSpan);
            }
            if (e.location) {
              var locSpan = document.createElement('span');
              locSpan.textContent = '\uD83D\uDCCD ' + e.location;
              meta.appendChild(locSpan);
            }
            card.appendChild(meta);

            if (checkedEventIds[e.id]) {
              var badge = document.createElement('div');
              badge.className = 'already-badge';
              badge.textContent = '\u2705 Already Checked In';
              card.appendChild(badge);
            } else {
              // Check if event is within check-in window
              var now = new Date();
              var notYet = false;
              var ended = false;
              if (e.event_time) {
                var startDT = new Date(e.event_date + 'T' + e.event_time);
                if (!isNaN(startDT.getTime()) && now < startDT) notYet = true;
              }
              if (e.event_end_time) {
                var endDT = new Date(e.event_date + 'T' + e.event_end_time);
                if (!isNaN(endDT.getTime()) && now > endDT) ended = true;
              }

              if (notYet) {
                var waitMsg = document.createElement('div');
                waitMsg.className = 'location-msg';
                waitMsg.style.color = '#f0ad4e';
                waitMsg.textContent = '\u23F3 Check-in opens at ' + e.event_time;
                card.appendChild(waitMsg);
              } else if (ended) {
                var closedMsg = document.createElement('div');
                closedMsg.className = 'location-msg';
                closedMsg.style.color = '#ff6b6b';
                closedMsg.textContent = '\u26D4 Check-in closed';
                card.appendChild(closedMsg);
              } else {
                if (e.latitude && e.longitude) {
                  var geoBadge = document.createElement('div');
                  geoBadge.className = 'geo-badge';
                  geoBadge.textContent = '\uD83D\uDCCD Location verified check-in';
                  card.appendChild(geoBadge);
                }
                var btn = document.createElement('button');
                btn.className = 'btn-checkin';
                btn.textContent = 'Check In Here';
                btn.setAttribute('data-event-id', e.id);
                btn.addEventListener('click', function() { doCheckin(e.id, btn, e); });
                card.appendChild(btn);
              }
            }

            eventsEl.appendChild(card);

            // Add to calendar popup list (all upcoming/active events that aren't ended)
            var isEnded = false;
            if (e.event_end_time) {
              var endCheck = new Date(e.event_date + 'T' + e.event_end_time);
              if (!isNaN(endCheck.getTime()) && new Date() > endCheck) isEnded = true;
            }
            if (!isEnded) {
              calendarEvents.push(e);
            }
          });

          // Show stacked "Add to Calendar" popups
          if (calendarEvents.length > 0) {
            showCalendarPopups(calendarEvents);
          }
        }

        if (data.checkins && data.checkins.length > 0) {
          document.getElementById('past-checkins').style.display = 'block';
          var pastEl = document.getElementById('past-list');
          data.checkins.forEach(function(c) {
            var item = document.createElement('div');
            item.className = 'past-item';
            item.textContent = c.title + ' \u2014 ' + new Date(c.checked_in_at + 'Z').toLocaleDateString();
            pastEl.appendChild(item);
          });
        }
      })
      .catch(function() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('not-found').style.display = 'block';
      });

    // ---- Add to Calendar Popup System ----

    function buildGoogleCalUrl(evt) {
      var title = encodeURIComponent(evt.title || 'Event');
      var location = encodeURIComponent(evt.location || '');
      var dateStr = (evt.event_date || '').replace(/-/g, '');
      var startTime = (evt.event_time || '00:00').replace(/:/g, '');
      var endTime = (evt.event_end_time || evt.event_time || '23:59').replace(/:/g, '');
      // If start and end are same, add 1 hour
      if (startTime === endTime) {
        var h = parseInt(startTime.substring(0, 2), 10) + 1;
        endTime = (h < 10 ? '0' : '') + h + startTime.substring(2);
      }
      var start = dateStr + 'T' + startTime + '00';
      var end = dateStr + 'T' + endTime + '00';
      return 'https://calendar.google.com/calendar/render?action=TEMPLATE' +
        '&text=' + title +
        '&dates=' + start + '/' + end +
        '&location=' + location +
        '&details=' + encodeURIComponent('Added via CampaignText');
    }

    function buildIcsData(evt) {
      var dateStr = (evt.event_date || '').replace(/-/g, '');
      var startTime = (evt.event_time || '00:00').replace(/:/g, '');
      var endTime = (evt.event_end_time || evt.event_time || '23:59').replace(/:/g, '');
      if (startTime === endTime) {
        var h = parseInt(startTime.substring(0, 2), 10) + 1;
        endTime = (h < 10 ? '0' : '') + h + startTime.substring(2);
      }
      var start = dateStr + 'T' + startTime + '00';
      var end = dateStr + 'T' + endTime + '00';
      var ics = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//CampaignText//EN',
        'BEGIN:VEVENT',
        'DTSTART:' + start,
        'DTEND:' + end,
        'SUMMARY:' + (evt.title || 'Event'),
        'LOCATION:' + (evt.location || ''),
        'DESCRIPTION:Added via CampaignText',
        'END:VEVENT',
        'END:VCALENDAR'
      ].join('\r\n');
      return ics;
    }

    function downloadIcs(evt) {
      var icsData = buildIcsData(evt);
      var blob = new Blob([icsData], { type: 'text/calendar;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = (evt.title || 'event').replace(/[^a-zA-Z0-9]/g, '_') + '.ics';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function showCalendarPopups(events) {
      // Create overlays for each event, stacked with increasing z-index
      // The LAST event in the array is on top (highest z-index)
      // When dismissed, reveals the one underneath
      var baseZ = 5000;
      var overlays = [];

      for (var i = 0; i < events.length; i++) {
        (function(evt, index) {
          var overlay = document.createElement('div');
          overlay.className = 'cal-popup-overlay';
          overlay.style.zIndex = baseZ + index;

          var popup = document.createElement('div');
          popup.className = 'cal-popup';

          // Icon
          var icon = document.createElement('div');
          icon.className = 'cal-icon';
          icon.textContent = '\uD83D\uDCC5';
          popup.appendChild(icon);

          // Title
          var titleEl = document.createElement('div');
          titleEl.className = 'cal-title';
          titleEl.textContent = evt.title;
          popup.appendChild(titleEl);

          // Meta (date, time, location)
          var metaLines = [];
          if (evt.event_date) metaLines.push(evt.event_date);
          if (evt.event_time) {
            var timeText = evt.event_time;
            if (evt.event_end_time) timeText += ' - ' + evt.event_end_time;
            metaLines.push(timeText);
          }
          if (evt.location) metaLines.push(evt.location);
          var metaEl = document.createElement('div');
          metaEl.className = 'cal-meta';
          metaEl.textContent = metaLines.join(' \u00B7 ');
          popup.appendChild(metaEl);

          // Counter (e.g., "Event 1 of 2")
          if (events.length > 1) {
            var counter = document.createElement('div');
            counter.className = 'cal-counter';
            counter.textContent = 'Event ' + (index + 1) + ' of ' + events.length;
            popup.appendChild(counter);
          }

          // Buttons container
          var btnsDiv = document.createElement('div');
          btnsDiv.className = 'cal-buttons';

          // Apple/ICS download button
          var icsBtn = document.createElement('button');
          icsBtn.className = 'cal-add-btn';
          icsBtn.textContent = 'Add to Calendar';
          icsBtn.addEventListener('click', function() {
            downloadIcs(evt);
            showAdded(popup, overlay);
          });
          btnsDiv.appendChild(icsBtn);

          // Google Calendar button
          var gBtn = document.createElement('a');
          gBtn.className = 'cal-google-btn';
          gBtn.textContent = 'Add to Google Calendar';
          gBtn.href = buildGoogleCalUrl(evt);
          gBtn.target = '_blank';
          gBtn.rel = 'noopener';
          gBtn.addEventListener('click', function() {
            setTimeout(function() { showAdded(popup, overlay); }, 300);
          });
          btnsDiv.appendChild(gBtn);

          // Skip button
          var skipBtn = document.createElement('button');
          skipBtn.className = 'cal-skip-btn';
          skipBtn.textContent = events.length > 1 ? 'Skip' : 'No thanks';
          skipBtn.addEventListener('click', function() {
            overlay.remove();
          });
          btnsDiv.appendChild(skipBtn);

          popup.appendChild(btnsDiv);

          // "Added" confirmation (hidden initially)
          var addedDiv = document.createElement('div');
          addedDiv.className = 'cal-added';
          var checkEl = document.createElement('div');
          checkEl.className = 'cal-check';
          checkEl.textContent = '\u2705';
          addedDiv.appendChild(checkEl);
          var addedMsg = document.createElement('p');
          addedMsg.textContent = 'Added to calendar!';
          addedDiv.appendChild(addedMsg);
          popup.appendChild(addedDiv);

          overlay.appendChild(popup);
          document.body.appendChild(overlay);
          overlays.push(overlay);
        })(events[i], i);
      }
    }

    function showAdded(popup, overlay) {
      // Hide buttons, show confirmation, then auto-dismiss
      var btns = popup.querySelector('.cal-buttons');
      var added = popup.querySelector('.cal-added');
      if (btns) btns.style.display = 'none';
      if (added) added.style.display = 'block';
      setTimeout(function() {
        overlay.remove();
      }, 1200);
    }

    // ---- Check-In System (unchanged) ----

    function sendCheckin(eventId, btn, lat, lng) {
      var body = { event_id: eventId };
      if (lat != null && lng != null) { body.latitude = lat; body.longitude = lng; }

      fetch('/api/voters/qr/' + token + '/checkin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.success) {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('successMsg').textContent =
              'Welcome to ' + data.eventTitle + ', ' + data.voterName + '!';
            document.getElementById('success').style.display = 'block';
          } else {
            document.getElementById('errorMsg').textContent = data.error || 'Check-in failed.';
            btn.disabled = false;
            btn.textContent = 'Check In Here';
          }
        })
        .catch(function() {
          document.getElementById('errorMsg').textContent = 'Network error. Please try again.';
          btn.disabled = false;
          btn.textContent = 'Check In Here';
        });
    }

    function doCheckin(eventId, btn, evt) {
      btn.disabled = true;
      document.getElementById('errorMsg').textContent = '';

      // If event has geofence, get location first
      if (evt && evt.latitude && evt.longitude) {
        btn.textContent = 'Getting location...';
        if (!navigator.geolocation) {
          document.getElementById('errorMsg').textContent = 'Your browser does not support location services.';
          btn.disabled = false;
          btn.textContent = 'Check In Here';
          return;
        }
        navigator.geolocation.getCurrentPosition(
          function(pos) {
            btn.textContent = 'Checking in...';
            sendCheckin(eventId, btn, pos.coords.latitude, pos.coords.longitude);
          },
          function(err) {
            var msg = 'Location access denied. Please enable location services to check in at this event.';
            if (err.code === 2) msg = 'Location unavailable. Please try again.';
            if (err.code === 3) msg = 'Location request timed out. Please try again.';
            document.getElementById('errorMsg').textContent = msg;
            btn.disabled = false;
            btn.textContent = 'Check In Here';
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
        );
      } else {
        btn.textContent = 'Checking in...';
        sendCheckin(eventId, btn, null, null);
      }
    }
  </script>
</body>
</html>
