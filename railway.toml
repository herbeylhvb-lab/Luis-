[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Railway caches Docker layers automatically with DOCKERFILE builder

[deploy]
startCommand = "node server.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ALWAYS"
restartPolicyMaxRetries = 5

# Persist SQLite database across deploys
[[volumes]]
mount = "/app/data"
name = "campaign_data"
